name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Regenerar proyecto Android
        run: |
          flutter create --platforms=android -t app temp_project
          cp -r lib temp_project/
          cp pubspec.yaml temp_project/
          cp -r .github temp_project/

      - name: Instalar dependencias
        run: |
          cd temp_project
          flutter pub get

      - name: Compilar APK
        run: |
          cd temp_project
          flutter build apk --release --no-tree-shake-icons

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: jump-king-apk
          path: temp_project/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
